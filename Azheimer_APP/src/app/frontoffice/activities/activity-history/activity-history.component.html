<div class="container py-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="display-5 fw-bold mb-3">Activity History</h2>
            <p class="text-muted">Track your progress and cognitive improvements over time.</p>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="bg-light">
                                <tr>
                                    <th class="py-3 ps-4">Date</th>
                                    <th class="py-3">Activity</th>
                                    <th class="py-3">Score</th>
                                    <th class="py-3">Duration</th>
                                    <th class="py-3 pe-4 text-end">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let result of results">
                                    <td class="ps-4">{{ result.date | date:'mediumDate' }}</td>
                                    <td>
                                        <span class="fw-medium">{{ getActivityTitle(result.activityId) }}</span>
                                    </td>
                                    <td>
                                        <span class="badge bg-primary-subtle text-primary rounded-pill px-3">
                                            {{ result.score }} pts
                                        </span>
                                    </td>
                                    <td>{{ formatDuration(result.duration) }}</td>
                                    <td class="pe-4 text-end">
                                        <span class="badge bg-success-subtle text-success">Completed</span>
                                    </td>
                                </tr>
                                <tr *ngIf="results.length === 0">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="bi bi-clock-history fs-1 d-block mb-3"></i>
                                        No activity history found.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
