<div class="container py-5" *ngIf="activity">
    <!-- Progress Bar -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between mb-2">
                <span class="fw-bold text-primary">{{ activity.title }}</span>
                <span class="text-muted">Question {{ currentContentIndex + 1 }} of {{ activity.contents?.length || 0
                    }}</span>
            </div>
            <div class="progress" style="height: 10px;">
                <div class="progress-bar bg-primary" role="progressbar" [style.width.%]="getProgress()">
                </div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center"
        *ngIf="currentContentIndex < (activity.contents?.length || 0); else resultTemplate">
        <div class="col-lg-8">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">

                    <!-- Image Section if applicable -->
                    <div *ngIf="activity.type === 'IMAGE_RECOGNITION' && currentContent?.imageUrl"
                        class="text-center mb-4">
                        <img [src]="currentContent?.imageUrl" class="img-fluid rounded shadow-sm" alt="Activity Image"
                            style="max-height: 300px;">
                    </div>

                    <!-- Question -->
                    <h3 class="text-center mb-5 fw-bold">{{ currentContent?.question }}</h3>

                    <!-- Options Grid -->
                    <div class="d-grid gap-3">
                        <button class="btn btn-outline-primary btn-lg py-3 text-start px-4 option-btn"
                            (click)="selectAnswer(currentContent?.optionA!)">
                            <span class="badge bg-primary-subtle text-primary me-3">A</span>
                            {{ currentContent?.optionA }}
                        </button>
                        <button class="btn btn-outline-primary btn-lg py-3 text-start px-4 option-btn"
                            (click)="selectAnswer(currentContent?.optionB!)">
                            <span class="badge bg-primary-subtle text-primary me-3">B</span>
                            {{ currentContent?.optionB }}
                        </button>
                        <button class="btn btn-outline-primary btn-lg py-3 text-start px-4 option-btn"
                            (click)="selectAnswer(currentContent?.optionC!)">
                            <span class="badge bg-primary-subtle text-primary me-3">C</span>
                            {{ currentContent?.optionC }}
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Result Template -->
    <ng-template #resultTemplate>
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-lg text-center p-5">
                    <div class="mb-4 text-success">
                        <i class="bi bi-check-circle-fill display-1"></i>
                    </div>
                    <h2 class="mb-3">Activity Completed!</h2>
                    <p class="lead text-muted mb-4">You have successfully finished this activity.</p>

                    <div class="display-4 fw-bold text-primary mb-2">{{ score }} / {{ activity.contents?.length }}</div>
                    <p class="text-muted mb-4">Your Score</p>

                    <div class="d-grid gap-2 col-8 mx-auto">
                        <button class="btn btn-primary btn-lg" (click)="goBack()">
                            <i class="bi bi-arrow-left me-2"></i>Back to Activities
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </ng-template>
</div>
