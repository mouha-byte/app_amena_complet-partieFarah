<div class="auth-page">
  <div class="auth-card">
    <a routerLink="/officiel" class="back-home">← Mind Care</a>
    <div class="auth-header">
      <div class="auth-icon">🧠</div>
      <h2>Connexion</h2>
      <p>Accédez à votre espace Mind Care</p>
    </div>
    <div *ngIf="error" class="alert error">⚠️ {{ error }}</div>
    <form (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="votre@email.com" />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="pwd-wrap">
          <input [type]="showPwd?'text':'password'" [(ngModel)]="password" name="password" placeholder="••••••" />
          <button type="button" class="eye" (click)="showPwd=!showPwd">{{showPwd?'🙈':'👁️'}}</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Se connecter</span><span *ngIf="loading" class="spin"></span>
      </button>
    </form>
    <p class="switch-link">Pas encore de compte ? <a routerLink="/officiel/register">Créer un compte</a></p>
    <div class="quick-fill">
      <span>Test rapide :</span>
      <button (click)="fill('admin@mindcare.com','admin123')">👑 Admin</button>
      <button (click)="fill('doctor@mindcare.com','doctor123')">🩺 Médecin</button>
      <button (click)="fill('patient@mindcare.com','patient123')">🧑 Patient</button>
    </div>
  </div>
</div>
