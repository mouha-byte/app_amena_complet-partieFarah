<div class="auth-page">
  <div class="auth-card">
    <a routerLink="/officiel" class="back-home">← Mind Care</a>
    <div class="auth-header">
      <div class="auth-icon">🧠</div>
      <h2>Créer un compte</h2>
      <p>Rejoignez Mind Care</p>
    </div>
    <div *ngIf="error" class="alert error">⚠️ {{ error }}</div>
    <div *ngIf="success" class="alert success">✅ {{ success }}</div>
    <form (ngSubmit)="submit()">
      <div class="form-row">
        <div class="field"><label>Prénom *</label><input [(ngModel)]="firstname" name="fn" placeholder="Jean" /></div>
        <div class="field"><label>Nom *</label><input [(ngModel)]="lastname" name="ln" placeholder="Dupont" /></div>
      </div>
      <div class="field"><label>Email *</label><input type="email" [(ngModel)]="email" name="em" placeholder="votre@email.com" /></div>
      <div class="field"><label>Téléphone</label><input type="tel" [(ngModel)]="phone" name="ph" placeholder="+216 XX XXX XXX" /></div>
      <div class="form-row">
        <div class="field"><label>Mot de passe *</label>
          <div class="pwd-wrap"><input [type]="showPwd?'text':'password'" [(ngModel)]="password" name="pw" placeholder="Min. 4 car." />
            <button type="button" class="eye" (click)="showPwd=!showPwd">{{showPwd?'🙈':'👁️'}}</button></div>
        </div>
        <div class="field"><label>Confirmer *</label><input [type]="showPwd?'text':'password'" [(ngModel)]="confirm" name="cf" placeholder="Répéter" /></div>
      </div>
      <div class="field"><label>Rôle</label>
        <div class="role-grid">
          <div *ngFor="let r of roles" class="role-opt" [class.sel]="role===r.v" (click)="role=r.v; onRoleChange()">
            <input type="radio" [(ngModel)]="role" name="role" [value]="r.v" (ngModelChange)="onRoleChange()" />
            <div class="rl">{{r.l}}</div><div class="rd">{{r.d}}</div>
          </div>
        </div>
      </div>
      <div class="field" *ngIf="role === 'PATIENT'">
        <label>Aidant lié *</label>
        <select [(ngModel)]="caregiverId" name="caregiverId" [disabled]="caregiversLoading || loading" required>
          <option [ngValue]="null">Sélectionner un aidant</option>
          <option *ngFor="let c of caregiverOptions" [ngValue]="c.id">{{ c.label }}</option>
        </select>
        <small *ngIf="caregiversLoading" style="display:block;margin-top:6px;color:#8f95b2;font-size:11px;">Chargement des aidants...</small>
        <small *ngIf="!caregiversLoading && !caregiverOptions.length" style="display:block;margin-top:6px;color:#8f95b2;font-size:11px;">Aucun aidant disponible.</small>
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Créer mon compte</span><span *ngIf="loading" class="spin"></span>
      </button>
    </form>
    <p class="switch-link">Déjà un compte ? <a routerLink="/officiel/login">Se connecter</a></p>
  </div>
</div>
