<div class="layout" [class.collapsed]="!sidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo" *ngIf="sidebarOpen">🧠 Mind Care</span>
      <span class="logo-sm" *ngIf="!sidebarOpen">🧠</span>
      <button class="toggle-btn" (click)="toggleSidebar()">{{ sidebarOpen ? '◀' : '▶' }}</button>
    </div>

    <div class="interface-head" *ngIf="sidebarOpen">
      <div class="interface-title">{{ interfaceTitle }}</div>
      <button class="switch-link" *ngIf="canGoLocalization" (click)="switchInterface('localization')">
        Aller a Localisation
      </button>
      <button class="switch-link" *ngIf="canGoActivity" (click)="switchInterface('activity')">
        Aller a Activites Quiz
      </button>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.link"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: false}"
         class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label" *ngIf="sidebarOpen">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card" *ngIf="sidebarOpen">
        <div class="avatar">{{ initials }}</div>
        <div class="user-info">
          <div class="uname">{{ user?.firstname }} {{ user?.lastname }}</div>
          <div class="urole">{{ roleBadge }}</div>
        </div>
      </div>
      <div class="avatar-only" *ngIf="!sidebarOpen">
        <div class="avatar sm">{{ initials }}</div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <span>🚪</span><span *ngIf="sidebarOpen"> Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
