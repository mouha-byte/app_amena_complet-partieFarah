<div class="category-list-container">
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="header-text">
        <h1 class="page-title">Forum Categories</h1>
        <p class="page-subtitle">Explore discussions by topic</p>
      </div>
    </div>
  </header>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="loading">
    <div class="loading-spinner"></div>
    <p>Loading categories...</p>
  </div>

  <!-- Categories Grid -->
  <div class="categories-grid" *ngIf="!loading">
    <!-- Empty State -->
    <div class="empty-state" *ngIf="categories.length === 0">
      <i class="ri-folder-line empty-icon"></i>
      <h3>No categories available</h3>
      <p>Check back later for new discussions</p>
    </div>

    <!-- Category Cards -->
    <div 
      class="category-card" 
      *ngFor="let category of categories"
      [style.background]="getCategoryGradient(category.name)"
      (click)="navigateToCategory(category)"
    >
      <div class="category-overlay">
        <div class="category-content">
          <div class="category-icon">
            <i [class]="getCategoryIcon(category.name)"></i>
          </div>
          <div class="category-info">
            <h3 class="category-name">{{ category.name }}</h3>
            <p class="category-description">{{ category.description || 'Join the discussion' }}</p>
          </div>
          <div class="category-arrow">
            <i class="ri-arrow-right-line"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
