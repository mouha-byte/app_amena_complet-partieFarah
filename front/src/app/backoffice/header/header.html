<!-- begin::NexLink Page Header -->
<header class="app-header">
  <div class="app-header-inner">
    <button class="app-toggler" type="button" aria-label="app toggler">
      <svg width="16" height="16" viewbox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.66699 12.6668L3.66699 8.00016L7.66699 3.3335" stroke="#1C274C" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"></path>
        <path opacity="0.5" d="M12.667 12.6668L8.66699 8.00016L12.667 3.3335" stroke="#1C274C" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>

    <div class="app-header-start d-none d-md-flex">
      <!-- Search Bar -->
      <form class="d-flex align-items-center h-100 w-lg-250px w-xxl-300px position-relative" action="#">
        <button type="button" class="btn btn-sm border-0 position-absolute start-0 ms-3 p-0">
          <i class="fi fi-rr-search"></i>
        </button>
        <input type="text" class="form-control form-control-fill ps-5" placeholder="Search anything's"
          data-bs-toggle="modal" data-bs-target="#searchResultsModal">
      </form>
    </div>

    <!-- User Menu -->
    <div class="app-header-end">

      <!-- Notification Bell -->
      <div class="notif-dropdown-wrapper position-relative me-2">
        <button type="button"
                class="btn btn-icon btn-action-gray rounded-circle waves-effect waves-light position-relative"
                (click)="toggleDropdown()">
          <i class="fi fi-rr-bell text-xl"></i>
          <span *ngIf="unreadCount > 0"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                style="font-size:10px;min-width:18px">
            {{ unreadCount > 99 ? '99+' : unreadCount }}
          </span>
        </button>

        <!-- Dropdown -->
        <div *ngIf="showDropdown"
             class="dropdown-menu show p-0 shadow"
             style="min-width:320px;right:0;left:auto;top:calc(100% + 8px);position:absolute;z-index:1050">

          <!-- Header -->
          <div class="px-3 py-2 border-bottom d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-semibold">
              Notifications
              <span *ngIf="unreadCount > 0" class="badge rounded-pill bg-primary ms-1" style="font-size:10px">
                {{ unreadCount }}
              </span>
            </h6>
            <button *ngIf="unreadCount > 0"
                    class="btn btn-link btn-sm p-0 text-muted text-decoration-none"
                    (click)="markAllRead()">
              Mark all read
            </button>
          </div>

          <!-- Notification list -->
          <div style="max-height:320px;overflow-y:auto">
            <div *ngIf="notifications.length === 0" class="text-center text-muted py-4 small">
              <i class="ri-notification-off-line fs-2 d-block mb-1"></i>
              No notifications
            </div>
            <div *ngFor="let n of notifications"
                 class="d-flex align-items-start gap-2 px-3 py-2 border-bottom cursor-pointer"
                 [class.bg-primary-subtle]="!n.read"
                 (click)="markRead(n)"
                 style="cursor:pointer">
              <div class="flex-shrink-0 mt-1">
                <i [class]="getTypeIcon(n.type)" style="font-size:18px"></i>
              </div>
              <div class="flex-grow-1 min-width-0">
                <p class="mb-0 small" [class.fw-semibold]="!n.read">{{ n.message }}</p>
                <span class="text-muted" style="font-size:10px">
                  {{ n.createdAt | date:'dd MMM, HH:mm' }}
                  <span class="ms-2 badge bg-secondary bg-opacity-25 text-secondary" style="font-size:9px">
                    {{ n.type }}
                  </span>
                </span>
              </div>
              <div *ngIf="!n.read" class="flex-shrink-0 mt-2">
                <span class="rounded-circle bg-primary d-inline-block" style="width:7px;height:7px"></span>
              </div>
            </div>
          </div>

          <!-- Footer -->
          <div class="px-3 py-2 border-top text-center">
            <small class="text-muted">{{ notifications.length }} recent notifications</small>
          </div>
        </div>
      </div>

      <!-- User info + logout -->
      <div class="px-lg-4 px-2 ps-0 d-flex align-items-center">
        <div class="d-flex align-items-center py-2 gap-3">
          <div class="avatar avatar-sm rounded-circle avatar-status-success">
            <img src="assets/backoffice/images/avatar/avatar1.webp" alt="">
          </div>
          <div class="ms-2 me-auto">
            <div class="fw-bold text-dark">{{ authService.getFullName() }}</div>
            <small class="text-body d-block lh-sm">{{ authService.getRole() }}</small>
          </div>
          <button class="btn btn-sm btn-outline-danger ms-3" (click)="logout()">
            <i class="fi fi-rr-sign-out me-1"></i> Déconnexion
          </button>
        </div>
      </div>

    </div>
  </div>
</header>
<!-- end::NexLink Page Header -->
