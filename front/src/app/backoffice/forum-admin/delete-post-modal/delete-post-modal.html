<div class="modal-content border-0">
    <div class="p-4 bg-danger bg-gradient rounded-top text-white">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <div class="p-2 bg-white bg-opacity-25 rounded shadow-sm">
                    <i class="ri-delete-bin-line fs-4"></i>
                </div>
                <h5 class="modal-title fw-bold mb-0">Delete Post</h5>
            </div>
            <button type="button" (click)="onCancel()" class="btn-close btn-close-white" aria-label="Close"></button>
        </div>
    </div>

    <mat-dialog-content class="p-4">
        <div class="d-flex align-items-start gap-4">
            <div class="p-3 bg-danger bg-opacity-10 rounded-circle flex-shrink-0 text-danger">
                <i class="ri-alert-line fs-1"></i>
            </div>
            <div>
                <h4 class="fw-bold text-dark mb-2">Are you sure?</h4>
                <p class="text-muted mb-3">
                    This action will permanently delete the post
                    <span class="fw-bold text-dark">"{{ data.post.title }}"</span>
                </p>
                <div class="alert alert-warning py-2 mb-0 border-0 rounded-3">
                    <i class="ri-information-line me-2"></i>
                    <small>This action cannot be undone. The post and all its comments will be permanently
                        removed.</small>
                </div>
            </div>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions class="p-4 pt-0 d-flex justify-content-end gap-2 border-0">
        <button mat-button (click)="onCancel()" class="btn btn-light border px-4 rounded-pill">
            Cancel
        </button>
        <button mat-raised-button (click)="onConfirm()" class="btn btn-danger px-4 rounded-pill shadow-sm">
            <i class="ri-delete-bin-line me-2"></i>Yes, Delete
        </button>
    </mat-dialog-actions>
</div>
