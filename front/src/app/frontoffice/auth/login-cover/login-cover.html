
  <div class="page-layout">

    <div class="auth-cover-wrapper">
      <div class="row g-0">
        <div class="col-md-6 order-md-1">
          <div class="auth-cover">
            <div class="clearfix">
              <img src="assets/backoffice/images/auth/vector1.svg" alt="" class="img-fluid cover-img">
              <div class="auth-content">
                <h1 class="display-6 fw-bold">Bienvenue !</h1>
                <p>AlzCare — Plateforme de gestion pour les patients Alzheimer. Connectez-vous pour accéder à votre espace.</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6 align-self-center">
          <div class="px-3 py-5 p-sm-5 maxw-450px m-auto">
            <div class="mb-4 text-center">
              <a routerLink="/">
                <h2 class="fw-bold text-primary">AlzCare</h2>
              </a>
            </div>
            <div class="text-center mb-5">
              <h5 class="mb-1">Connexion</h5>
              <p>Entrez vos identifiants pour accéder à votre compte.</p>
            </div>

            <form (ngSubmit)="onLogin()">
              <div class="mb-4">
                <label class="form-label" for="loginEmail">Email</label>
                <input type="email" class="form-control" id="loginEmail"
                       [(ngModel)]="email" name="email"
                       placeholder="exemple@mail.com" required>
              </div>
              <div class="mb-4">
                <label class="form-label" for="loginPassword">Mot de passe</label>
                <input type="password" class="form-control" id="loginPassword"
                       [(ngModel)]="password" name="password"
                       placeholder="********" required>
              </div>

              <div class="mb-3" *ngIf="errorMessage">
                <div class="alert alert-danger py-2">{{ errorMessage }}</div>
              </div>

              <div class="mb-3">
                <button type="submit" class="btn btn-primary waves-effect waves-light w-100" [disabled]="loading">
                  {{ loading ? 'Connexion...' : 'Se connecter' }}
                </button>
              </div>
              <p class="mb-3 text-center">
                Pas encore de compte ? <a routerLink="/register-cover">S'inscrire ici</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
