
  <div class="page-layout">

    <div class="auth-cover-wrapper">
      <div class="row g-0">
        <div class="col-md-6 order-md-1">
          <div class="auth-cover">
            <div class="clearfix">
              <img src="assets/backoffice/images/auth/vector1.svg" alt="" class="img-fluid cover-img">
              <div class="auth-content">
                <h1 class="display-6 fw-bold">Rejoignez AlzCare</h1>
                <p>Créez votre compte pour gérer les soins, signaler des incidents et participer au forum.</p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6 align-self-center">
          <div class="px-3 py-5 p-sm-5 maxw-450px m-auto">
            <div class="mb-4 text-center">
              <a routerLink="/">
                <h2 class="fw-bold text-primary">AlzCare</h2>
              </a>
            </div>
            <div class="text-center mb-4">
              <h5 class="mb-1">Créer un compte</h5>
            </div>

            <form (ngSubmit)="onRegister()">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Prénom *</label>
                  <input type="text" class="form-control" [(ngModel)]="firstName" name="firstName"
                         placeholder="Prénom" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Nom</label>
                  <input type="text" class="form-control" [(ngModel)]="lastName" name="lastName"
                         placeholder="Nom">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" [(ngModel)]="email" name="email"
                       placeholder="exemple@mail.com" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Mot de passe *</label>
                <input type="password" class="form-control" [(ngModel)]="password" name="password"
                       placeholder="********" required>
              </div>

              <div class="mb-4">
                <label class="form-label">Rôle</label>
                <select class="form-select" [(ngModel)]="role" name="role">
                  <option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</option>
                </select>
              </div>

              <div class="mb-3" *ngIf="errorMessage">
                <div class="alert alert-danger py-2">{{ errorMessage }}</div>
              </div>
              <div class="mb-3" *ngIf="successMessage">
                <div class="alert alert-success py-2">{{ successMessage }}</div>
              </div>

              <div class="mb-3">
                <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                  {{ loading ? 'Inscription...' : 'S\'inscrire' }}
                </button>
              </div>
              <p class="text-center">Déjà un compte ? <a routerLink="/login-cover">Se connecter</a></p>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
