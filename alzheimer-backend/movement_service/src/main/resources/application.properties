spring.application.name=movement_service
spring.datasource.url=jdbc:mysql://localhost:3306/movement_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8082
localization.service.base-url=http://localhost:8087
users.service.base-url=http://localhost:8086

# Movement alert thresholds
movement.alerts.rapid-speed-kmh=20
movement.alerts.immobile-hours=2
movement.alerts.immobile-radius-meters=25
movement.alerts.no-gps-minutes=30
movement.alerts.cooldown-minutes=20
movement.alerts.no-gps-check-ms=600000
movement.alerts.immobility-check-ms=1800000

# Email notifications (configure with your SMTP account)
movement.alert.email.to=admin@mindcare.com
movement.alert.email.from=noreply@mindcare.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
